# pytest.ini — Kerno test runner configuration
# Placed at the repository root.
#
# All tests live under tests/ (CLAUDE.md §4):
#   tests/unit/          fast tests with no external dependencies
#   tests/security/      tenant-isolation boundary tests
#   tests/integration/   tests requiring a live database or external service

[pytest]
testpaths =
    tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    --tb=short
    --strict-markers
    -q

markers =
    unit: Fast unit tests with no external dependencies
    integration: Tests requiring a live PostgreSQL database
    slow: Tests that take more than 2 seconds

minversion = 7.0
