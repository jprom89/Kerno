# alembic.ini — Alembic migration tool configuration for Kerno.
#
# sqlalchemy.url is intentionally absent: migrations/env.py reads
# DATABASE_URL from the environment at runtime and injects it via
# config.set_main_option(). Never hardcode credentials here.

[alembic]
script_location = migrations

# Prepend the repo root to sys.path so "src.*" imports resolve correctly
# when Alembic spawns its own Python process.
prepend_sys_path = .

# Migration filename format: NNN_description.py (three-digit zero-padded).
# New revisions created with "alembic revision" inherit this template.
file_template = %%(rev)s_%%(slug)s

# Truncate the slug portion of auto-generated filenames at 40 characters.
truncate_slug_length = 40

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
