<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Kerno</title>
  <link rel="stylesheet" href="./css/main.css">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">Kerno<span>.</span></div>
    <p class="login-tagline">DORA Compliance Copilot — sign in to continue</p>

    <div id="error-msg" class="alert alert-error hidden"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" autocomplete="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
        Sign in
      </button>
    </form>
  </div>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
